<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HTML to Figma Importer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    font-size: 13px;
    background: #1a1a2e;
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid #2d2d4a;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .logo {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .header-text h1 { font-size: 13px; font-weight: 600; color: #fff; }
  .header-text p  { font-size: 11px; color: #64748b; margin-top: 1px; }

  /* Body */
  .body { flex: 1; overflow-y: auto; padding: 14px 18px; display: flex; flex-direction: column; gap: 12px; }

  label { font-size: 11px; font-weight: 500; color: #94a3b8; display: block; margin-bottom: 5px; }

  /* Dropzone */
  .drop-zone {
    border: 2px dashed #3d3d5c;
    border-radius: 10px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    background: #16213e;
    position: relative;
  }
  .drop-zone.drag-over { border-color: #6366f1; background: rgba(99,102,241,.08); }
  .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .drop-zone .dz-icon { font-size: 22px; margin-bottom: 6px; }
  .drop-zone .dz-text { font-size: 12px; color: #64748b; }
  .drop-zone .dz-text span { color: #6366f1; }
  .file-name {
    font-size: 11px; color: #a5b4fc; background: rgba(99,102,241,.15);
    border-radius: 6px; padding: 4px 8px; margin-top: 6px; display: inline-block;
  }

  .divider { display: flex; align-items: center; gap: 8px; color: #3d3d5c; font-size: 11px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #2d2d4a; }

  textarea {
    width: 100%; height: 140px; resize: vertical;
    background: #0f0f1a; border: 1px solid #2d2d4a; border-radius: 10px;
    color: #94a3b8; font-family: 'Menlo', 'Courier New', monospace; font-size: 11px;
    padding: 10px; line-height: 1.5;
    transition: border-color .15s;
    outline: none;
  }
  textarea:focus { border-color: #4f46e5; }
  textarea::placeholder { color: #3d3d5c; }

  /* Status */
  .status {
    border-radius: 8px; padding: 9px 12px; font-size: 11px; display: none;
    align-items: flex-start; gap: 8px;
  }
  .status.show { display: flex; }
  .status.info    { background: rgba(99,102,241,.12); color: #a5b4fc; border: 1px solid rgba(99,102,241,.2); }
  .status.success { background: rgba(16,185,129,.1);  color: #6ee7b7; border: 1px solid rgba(16,185,129,.2); }
  .status.error   { background: rgba(239,68,68,.1);   color: #fca5a5; border: 1px solid rgba(239,68,68,.2); }
  .status-icon { font-size: 14px; flex-shrink: 0; }
  .status-text { line-height: 1.45; }

  /* Footer */
  .footer {
    padding: 12px 18px; border-top: 1px solid #2d2d4a; flex-shrink: 0;
    display: flex; gap: 8px;
  }
  button {
    flex: 1; height: 34px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 12px; font-weight: 600; transition: opacity .15s, transform .1s;
  }
  button:active { transform: scale(.97); }
  .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; }
  .btn-primary:hover { opacity: .9; }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .btn-secondary { background: #2d2d4a; color: #94a3b8; flex: 0 0 80px; }
  .btn-secondary:hover { background: #3d3d5c; }

  /* Loading spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 14px; height: 14px; border: 2px solid rgba(165,180,252,.3);
    border-top-color: #a5b4fc; border-radius: 50%;
    animation: spin .7s linear infinite; flex-shrink: 0; margin-top: 1px;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #3d3d5c; border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🎨</div>
  <div class="header-text">
    <h1>HTML to Figma Importer</h1>
    <p>นำเข้า builder.json จาก web app</p>
  </div>
</div>

<div class="body">
  <!-- File drop zone -->
  <div>
    <label>อัปโหลดไฟล์ builder.json</label>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".json" />
      <div class="dz-icon">📂</div>
      <div class="dz-text">ลากไฟล์มาวาง หรือ <span>คลิกเพื่อเลือก</span></div>
      <div class="file-name" id="fileName" style="display:none"></div>
    </div>
  </div>

  <div class="divider">หรือ</div>

  <!-- Paste JSON -->
  <div>
    <label>วาง JSON โดยตรง</label>
    <textarea id="jsonInput" placeholder='{ "layers": [...], "images": {} }'></textarea>
  </div>

  <!-- Status -->
  <div class="status" id="status">
    <div class="status-icon" id="statusIcon"></div>
    <div class="status-text" id="statusText"></div>
  </div>
</div>

<div class="footer">
  <button class="btn-secondary" id="btnClose">ปิด</button>
  <button class="btn-primary" id="btnImport">🚀 Import to Figma</button>
</div>

<script>
  const jsonInput = document.getElementById('jsonInput');
  const fileInput = document.getElementById('fileInput');
  const dropZone  = document.getElementById('dropZone');
  const fileName  = document.getElementById('fileName');
  const btnImport = document.getElementById('btnImport');
  const btnClose  = document.getElementById('btnClose');
  const statusEl  = document.getElementById('status');
  const statusIcon = document.getElementById('statusIcon');
  const statusText = document.getElementById('statusText');

  // ── File handling ────────────────────────────────────────────────────────────
  fileInput.addEventListener('change', () => readFile(fileInput.files[0]));

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) readFile(file);
  });

  function readFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      jsonInput.value = e.target.result;
      fileName.textContent = file.name;
      fileName.style.display = 'inline-block';
      showStatus('info', null, `โหลดไฟล์: ${file.name}`);
    };
    reader.readAsText(file);
  }

  // ── Import ───────────────────────────────────────────────────────────────────
  btnImport.addEventListener('click', () => {
    const json = jsonInput.value.trim();
    if (!json) return showStatus('error', '⚠️', 'กรุณาวาง JSON หรืออัปโหลดไฟล์ก่อน');
    btnImport.disabled = true;
    showStatus('loading', null, 'กำลังนำเข้า...');
    parent.postMessage({ pluginMessage: { type: 'import', json } }, '*');
  });

  btnClose.addEventListener('click', () => {
    parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
  });

  // ── Messages from plugin ─────────────────────────────────────────────────────
  window.onmessage = (e) => {
    const msg = e.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'progress') {
      showStatus('loading', null, msg.message);
    } else if (msg.type === 'success') {
      btnImport.disabled = false;
      showStatus('success', '✅', msg.message);
    } else if (msg.type === 'error') {
      btnImport.disabled = false;
      showStatus('error', '❌', msg.message);
    }
  };

  // ── Status helper ─────────────────────────────────────────────────────────────
  function showStatus(type, icon, text) {
    statusEl.className = 'status show ' + (type === 'loading' ? 'info' : type);
    if (type === 'loading') {
      statusIcon.innerHTML = '<div class="spinner"></div>';
    } else {
      statusIcon.textContent = icon || '';
    }
    statusText.textContent = text;
  }
</script>
</body>
</html>
