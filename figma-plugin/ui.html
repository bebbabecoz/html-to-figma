<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    font-size: 13px; background: #1a1a2e; color: #e2e8f0;
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  .header {
    padding: 14px 16px 12px; border-bottom: 1px solid #2d2d4a;
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  .logo {
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .header h1 { font-size: 13px; font-weight: 600; color: #fff; }
  .header p  { font-size: 11px; color: #4a5568; margin-top: 1px; }
  .body { flex: 1; display: flex; flex-direction: column; padding: 16px; gap: 12px; overflow-y: auto; }
  .drop-zone {
    flex: 1; min-height: 180px; border: 2px dashed #3d3d5c; border-radius: 12px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; cursor: pointer; transition: border-color .15s, background .15s;
    background: #12122a; position: relative; padding: 24px; text-align: center;
  }
  .drop-zone:hover    { border-color: #5b5bf0; background: rgba(99,102,241,.05); }
  .drop-zone.dragover { border-color: #6366f1; background: rgba(99,102,241,.1); }
  .drop-zone input    { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .dz-icon  { font-size: 32px; line-height: 1; }
  .dz-title { font-size: 13px; font-weight: 600; color: #c4b5fd; }
  .dz-sub   { font-size: 11px; color: #4a5568; }
  .dz-sub span { color: #6366f1; }
  .file-badge {
    display: none; align-items: center; gap: 8px;
    background: rgba(99,102,241,.15); border: 1px solid rgba(99,102,241,.3);
    border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #a5b4fc; word-break: break-all;
  }
  .file-badge.show { display: flex; }
  .file-badge-name { flex: 1; }
  .file-badge-clear { background: none; border: none; color: #64748b; cursor: pointer; font-size: 14px; padding: 0; }
  .file-badge-clear:hover { color: #e2e8f0; }
  .status {
    border-radius: 8px; padding: 10px 12px; font-size: 11.5px;
    line-height: 1.5; display: none; gap: 8px; align-items: flex-start;
  }
  .status.show    { display: flex; }
  .status.info    { background: rgba(99,102,241,.12); color: #a5b4fc; border: 1px solid rgba(99,102,241,.2); }
  .status.success { background: rgba(16,185,129,.1);  color: #6ee7b7; border: 1px solid rgba(16,185,129,.2); }
  .status.error   { background: rgba(239,68,68,.1);   color: #fca5a5; border: 1px solid rgba(239,68,68,.2); }
  .status-icon { flex-shrink: 0; }
  .status-msg  { flex: 1; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 13px; height: 13px; border: 2px solid rgba(165,180,252,.3);
    border-top-color: #a5b4fc; border-radius: 50%;
    animation: spin .65s linear infinite; flex-shrink: 0; margin-top: 1px;
  }
  .progress-wrap { height: 3px; background: #2d2d4a; border-radius: 2px; overflow: hidden; display: none; }
  .progress-wrap.show { display: block; }
  .progress-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    border-radius: 2px; transition: width .3s ease;
  }
  .footer { padding: 12px 16px; border-top: 1px solid #2d2d4a; display: flex; gap: 8px; flex-shrink: 0; }
  button {
    height: 34px; border-radius: 8px; border: none;
    font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity .15s, transform .1s;
  }
  button:active { transform: scale(.97); }
  .btn-primary  { flex: 1; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; }
  .btn-primary:hover    { opacity: .88; }
  .btn-primary:disabled { opacity: .35; cursor: not-allowed; transform: none; }
  .btn-secondary { width: 72px; background: #252540; color: #64748b; border: 1px solid #2d2d4a; }
  .btn-secondary:hover { background: #2d2d4a; color: #94a3b8; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #3d3d5c; border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🎨</div>
  <div>
    <h1>HTML to Figma Importer</h1>
    <p>Drop ไฟล์ .html → สร้าง Figma layers ทันที</p>
  </div>
</div>

<div class="body">
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".html,.htm" />
    <div class="dz-icon"  id="dzIcon">📄</div>
    <div class="dz-title" id="dzTitle">Drop ไฟล์ HTML ที่นี่</div>
    <div class="dz-sub"   id="dzSub">หรือ <span>คลิกเพื่อเลือกไฟล์</span> · .html, .htm</div>
  </div>
  <div class="file-badge" id="fileBadge">
    <span>📄</span>
    <span class="file-badge-name" id="fileBadgeName"></span>
    <button class="file-badge-clear" id="fileClear">✕</button>
  </div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="status" id="status">
    <div class="status-icon" id="statusIcon"></div>
    <div class="status-msg"  id="statusMsg"></div>
  </div>
</div>

<div class="footer">
  <button class="btn-secondary" id="btnClose">ปิด</button>
  <button class="btn-primary"   id="btnImport" disabled>🚀 Import to Figma</button>
</div>

<script>
// ─── Converter: injected into hidden iframe, builds nested FRAME tree ─────────
// Mirrors html.to.design approach: DOM tree → Figma FRAME tree with Auto Layout
var CONVERTER_SRC = (function() {
/*CONVERTER_START*/
function __convert() {
  var win = window, doc = document;

  // ── Utilities ───────────────────────────────────────────────────────────────
  function px(v)  { return Math.round(parseFloat(v) || 0); }
  function pxf(v) { return parseFloat(v) || 0; }

  function parseColor(str) {
    if (!str || str === 'transparent' || str === 'none') return null;
    var m = str.match(/rgba?\(\s*([\d.]+)\s*,\s*([\d.]+)\s*,\s*([\d.]+)(?:\s*,\s*([\d.]+))?\s*\)/);
    if (!m) return null;
    var a = m[4] !== undefined ? parseFloat(m[4]) : 1;
    if (a === 0) return null;
    return { r: parseFloat(m[1])/255, g: parseFloat(m[2])/255, b: parseFloat(m[3])/255, a: a };
  }

  function mkFill(c) {
    return { type: 'SOLID', color: { r: c.r, g: c.g, b: c.b }, opacity: c.a };
  }

  function fontFam(str) {
    return (str || '').split(',')[0].replace(/['"]/g, '').trim() || 'Inter';
  }

  function elName(el) {
    var t = el.tagName.toLowerCase();
    if (el.id) return t + '#' + el.id;
    if (el.className && typeof el.className === 'string') {
      var c = el.className.trim().split(/\s+/)[0];
      if (c) return t + '.' + c;
    }
    return t;
  }

  function parseShadow(str) {
    if (!str || str === 'none') return null;
    var m = str.match(/(-?[\d.]+)px\s+(-?[\d.]+)px\s+(-?[\d.]+)px(?:\s+(-?[\d.]+)px)?\s+(rgba?\([^)]+\))/);
    if (!m) return null;
    var c = parseColor(m[5]);
    if (!c) return null;
    return {
      type: 'DROP_SHADOW', visible: true, blendMode: 'NORMAL',
      offset: { x: pxf(m[1]), y: pxf(m[2]) },
      radius: pxf(m[3]), spread: pxf(m[4]) || 0,
      color: { r: c.r, g: c.g, b: c.b, a: c.a }

  }

  function borderInfo(style) {
    var sides = ['Top','Right','Bottom','Left'];
    var maxW = Math.max.apply(null, sides.map(function(s){ return pxf(style['border'+s+'Width']); }));
    return { weight: maxW, color: parseColor(style.borderTopColor), style: style.borderTopStyle };
  }

  function applyRadius(node, style) {
    var tl = px(style.borderTopLeftRadius),    tr = px(style.borderTopRightRadius);
    var bl = px(style.borderBottomLeftRadius), br = px(style.borderBottomRightRadius);
    if (tl===tr && tl===bl && tl===br) { if (tl > 0) node.cornerRadius = tl; }
    else if (tl||tr||bl||br) {
      node.topLeftRadius=tl; node.topRightRadius=tr;
      node.bottomLeftRadius=bl; node.bottomRightRadius=br;
    }
  }

  // Tags to skip entirely
  var SKIP = { script:1, style:1, noscript:1, template:1, head:1, svg:1, canvas:1, math:1 };
  var FORM = { input:1, textarea:1, select:1 };
  var IMGS = { img:1, picture:1 };

  var TA_MAP = { left:'LEFT', right:'RIGHT', center:'CENTER', justify:'JUSTIFIED', start:'LEFT', end:'RIGHT' };
  var AI_MAP = { 'center':'CENTER', 'flex-end':'MAX', 'end':'MAX', 'stretch':'MIN', 'flex-start':'MIN', 'normal':'MIN', 'baseline':'MIN' };
  var JC_MAP = { 'center':'CENTER', 'flex-end':'MAX', 'end':'MAX', 'space-between':'SPACE_BETWEEN', 'flex-start':'MIN', 'normal':'MIN', 'start':'MIN' };

  // ── Text node builder ────────────────────────────────────────────────────────
  function mkTextNode(el, style, x, y, w, h) {
    var text = ((el.innerText !== undefined ? el.innerText : el.textContent) || '')
                 .replace(/\r?\n/g, ' ').replace(/\s{2,}/g, ' ').trim();
    if (!text) return null;
    var fSz  = Math.max(1, px(style.fontSize) || 14);
    var fCol = parseColor(style.color);
    var lhRaw = style.lineHeight;
    var lh = (lhRaw && lhRaw !== 'normal') ? { value: px(lhRaw), unit: 'PIXELS' } : { unit: 'AUTO' };
    var ls = pxf(style.letterSpacing);
    // Decide Figma textAutoResize mode:
    // - nowrap/pre → WIDTH_AND_HEIGHT (never clips, expands naturally)
    // - normal wrap → HEIGHT (fixed width, auto height)
    var ws = style.whiteSpace || '';
    var isNowrap = (ws === 'nowrap' || ws === 'pre' || ws === 'pre-wrap');
    var autoResize = isNowrap ? 'WIDTH_AND_HEIGHT' : 'HEIGHT';

    var n = {
      type: 'TEXT', name: text.slice(0, 40),
      x: x, y: y, width: Math.max(1,w), height: Math.max(1,h),
      characters: text,
      fontSize: fSz,
      fontWeight: parseInt(style.fontWeight) || 400,
      fontFamily: fontFam(style.fontFamily),
      textAlignHorizontal: TA_MAP[style.textAlign] || 'LEFT',
      lineHeight: lh,
      fills: fCol ? [mkFill(fCol)] : [],
      textAutoResize: autoResize
    };
    if (ls && !isNaN(ls) && ls !== 0) n.letterSpacing = { value: ls, unit: 'PIXELS' };
    var td = style.textDecoration || '';
    if (td.indexOf('underline')    !== -1) n.textDecoration = 'UNDERLINE';
    else if (td.indexOf('line-through') !== -1) n.textDecoration = 'STRIKETHROUGH';
    return n;
  }

  // ── Frame styling (fills, strokes, radius, etc.) ─────────────────────────────
  function styleFrame(f, el, style) {
    // Background
    var bgc = parseColor(style.backgroundColor);
    if (bgc) {
      f.fills = [mkFill(bgc)];
    } else if (style.backgroundImage && style.backgroundImage !== 'none') {
      // gradient/image → light neutral placeholder so shape is visible
      f.fills = [{ type:'SOLID', color:{r:.92,g:.92,b:.95}, opacity:1 }];
    } else {
      f.fills = [];
    }

    // Border
    var bd = borderInfo(style);
    if (bd.weight > 0 && bd.color) {
      f.strokes      = [mkFill(bd.color)];
      f.strokeWeight = bd.weight;
      f.strokeAlign  = 'INSIDE';
      if (bd.style === 'dashed') f.dashPattern = [6, 4];
      else if (bd.style === 'dotted') f.dashPattern = [2, 3];
    } else {
      f.strokes = [];
    }

    // Radius
    applyRadius(f, style);

    // Opacity
    var op = pxf(style.opacity);
    if (op >= 0 && op < 1) f.opacity = op;

    // Clip content — only for genuine scroll/overflow containers, NOT layout wrappers.
    // Setting clipsContent=true on a wrapper frame causes text/children to be visually
    // clipped even when textAutoResize=WIDTH_AND_HEIGHT. Default to false.
    var ov = style.overflow, ovX = style.overflowX, ovY = style.overflowY;
    var isScrollContainer = (ov === 'auto' || ov === 'scroll' || ovX === 'auto' || ovX === 'scroll' || ovY === 'auto' || ovY === 'scroll');
    // Only clip if it's a scroll container with a defined height (not just a layout div)
    if (isScrollContainer && px(style.height) > 0) {
      f.clipsContent = true;
    }

    // Shadow
    var sh = parseShadow(style.boxShadow);
    f.effects = sh ? [sh] : [];
  }

  // ── Auto Layout from CSS Flexbox ─────────────────────────────────────────────
  function applyAutoLayout(f, style) {
    var dir = style.flexDirection || 'row';
    f.layoutMode = (dir === 'column' || dir === 'column-reverse') ? 'VERTICAL' : 'HORIZONTAL';

    var gap = pxf(style.gap) || 0;
    f.itemSpacing = Math.round(
      f.layoutMode === 'VERTICAL'
        ? (pxf(style.rowGap) || gap)
        : (pxf(style.columnGap) || gap)
    );

    f.paddingTop    = Math.round(pxf(style.paddingTop));
    f.paddingRight  = Math.round(pxf(style.paddingRight));
    f.paddingBottom = Math.round(pxf(style.paddingBottom));
    f.paddingLeft   = Math.round(pxf(style.paddingLeft));

    f.counterAxisAlignItems = AI_MAP[style.alignItems]     || 'MIN';
    f.primaryAxisAlignItems = JC_MAP[style.justifyContent] || 'MIN';

    // Force FIXED so the frame keeps its exact pixel dimensions from getBoundingClientRect
    f.primaryAxisSizingMode = 'FIXED';
    f.counterAxisSizingMode = 'FIXED';

    if (style.flexWrap === 'wrap') f.layoutWrap = 'WRAP';
  }

  // ── Main recursive builder ───────────────────────────────────────────────────
  function buildNode(el, parentLeft, parentTop) {
    if (el.nodeType !== 1) return null;
    var tag = el.tagName.toLowerCase();
    if (SKIP[tag]) return null;

    var style = win.getComputedStyle(el);
    if (style.display === 'none') return null;
    if (style.visibility === 'hidden') return null;
    if (pxf(style.opacity) === 0) return null;

    var rect = el.getBoundingClientRect();
    var w = Math.round(rect.width), h = Math.round(rect.height);
    if (w < 1 && h < 1) return null;

    // Position relative to parent container
    var x = Math.round(rect.left - parentLeft);
    var y = Math.round(rect.top  - parentTop);

    // ── <img> / <picture> ────────────────────────────────────────────────────
    if (IMGS[tag]) {
      return {
        type: 'RECTANGLE', name: el.alt || 'image',
        x: x, y: y, width: Math.max(1,w), height: Math.max(1,h),
        fills: [{ type:'SOLID', color:{r:.85,g:.85,b:.88}, opacity:1 }],
        strokes: [], effects: []
      };
    }

    // ── <input> / <textarea> / <select> ─────────────────────────────────────
    if (FORM[tag]) {
      var frm = {
        type: 'FRAME', name: elName(el),
        x: x, y: y, width: Math.max(1,w), height: Math.max(1,h),
        children: []
      };
      styleFrame(frm, el, style);
      var val = (el.value || el.placeholder || '').trim();
      if (val) {
        var fSzI = Math.max(1, px(style.fontSize) || 14);
        var fColI = parseColor(style.color);
        var padL  = Math.round(pxf(style.paddingLeft));
        var padT  = Math.round(pxf(style.paddingTop));
        frm.children.push({
          type: 'TEXT', name: val.slice(0, 30),
          x: padL, y: padT,
          width:  Math.max(1, w - padL - Math.round(pxf(style.paddingRight))),
          height: Math.max(1, fSzI + 4),
          characters: val,
          fontSize: fSzI,
          fontFamily: fontFam(style.fontFamily),
          fontWeight: parseInt(style.fontWeight) || 400,
          fills: fColI ? [mkFill(fColI)] : [{ type:'SOLID', color:{r:.4,g:.4,b:.4}, opacity:1 }],
          textAlignHorizontal: TA_MAP[style.textAlign] || 'LEFT',
          lineHeight: { unit: 'AUTO' },
          textAutoResize: 'HEIGHT'
        });
      }
      return frm;
    }

    // ── Decide: TEXT leaf vs container FRAME ─────────────────────────────────
    // Text leaf = no element children, OR has direct text nodes (mixed inline content)
    var hasElemChild  = false;
    var hasDirectText = false;
    for (var ci = 0; ci < el.childNodes.length; ci++) {
      var cn = el.childNodes[ci];
      if (cn.nodeType === 1) hasElemChild = true;
      else if (cn.nodeType === 3 && cn.textContent.trim()) hasDirectText = true;
    }

    if (!hasElemChild || hasDirectText) {
      var tn = mkTextNode(el, style, x, y, w, h);
      if (tn) return tn;
      // text was empty — fall through to container
    }

    // ── Container FRAME ──────────────────────────────────────────────────────
    var isFlex = (style.display === 'flex' || style.display === 'inline-flex');
    var frame = {
      type: 'FRAME', name: elName(el),
      x: x, y: y, width: Math.max(1,w), height: Math.max(1,h),
      children: []
    };
    styleFrame(frame, el, style);
    if (isFlex) applyAutoLayout(frame, style);

    // Build children — coords relative to THIS element
    for (var i = 0; i < el.children.length; i++) {
      var child      = el.children[i];
      var childStyle = win.getComputedStyle(child);
      var childNode  = buildNode(child, rect.left, rect.top);
      if (!childNode) continue;

      // Absolutely positioned children inside an auto-layout frame
      if (isFlex) {
        var pos = childStyle.position;
        if (pos === 'absolute' || pos === 'fixed') {
          childNode.layoutPositioning = 'ABSOLUTE';
        }
      }

      frame.children.push(childNode);
    }

    return frame;
  }

  // ── Root page frame ──────────────────────────────────────────────────────────
  var pw = Math.round(win.innerWidth);
  var ph = Math.round(Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight));
  var bs = win.getComputedStyle(doc.body);
  var bodyBg = parseColor(bs.backgroundColor)
            || parseColor(win.getComputedStyle(doc.documentElement).backgroundColor)
            || { r:1, g:1, b:1, a:1 };

  var root = {
    type: 'FRAME', name: 'Page',
    x: 0, y: 0, width: pw, height: ph,
    fills: [mkFill(bodyBg)], strokes: [], effects: [],
    clipsContent: false, children: []
  };

  // Apply body flexbox if set
  var bDisp = bs.display;
  if (bDisp === 'flex' || bDisp === 'inline-flex') {
    applyAutoLayout(root, bs);
    root.clipsContent = false;
    root.primaryAxisSizingMode = 'FIXED';
    root.counterAxisSizingMode = 'FIXED';
  }

  for (var i = 0; i < doc.body.children.length; i++) {
    var c = buildNode(doc.body.children[i], 0, 0);
    if (c) root.children.push(c);
  }

  return [root];
}
/*CONVERTER_END*/
  return __convert.toString() + '\nvar __layers = __convert(); window.parent.postMessage({ __h2f: true, layers: JSON.parse(JSON.stringify(__layers)) }, "*");';
})();

// ─── State ────────────────────────────────────────────────────────────────────
var htmlContent = null, converting = false;

var dropZone  = document.getElementById('dropZone');
var fileInput = document.getElementById('fileInput');
var fileBadge = document.getElementById('fileBadge');
var fileBadgeName = document.getElementById('fileBadgeName');
var btnImport = document.getElementById('btnImport');
var btnClose  = document.getElementById('btnClose');
var progressBar  = document.getElementById('progressBar');
var progressWrap = document.getElementById('progressWrap');

// ─── File handling ────────────────────────────────────────────────────────────
fileInput.addEventListener('change', function() {
  if (fileInput.files && fileInput.files[0]) loadFile(fileInput.files[0]);
});
dropZone.addEventListener('dragover',  function(e) { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', function()  { dropZone.classList.remove('dragover'); });
dropZone.addEventListener('drop', function(e) {
  e.preventDefault(); dropZone.classList.remove('dragover');
  var f = e.dataTransfer && e.dataTransfer.files[0];
  if (f) loadFile(f);
});
document.getElementById('fileClear').addEventListener('click', function(e) {
  e.stopPropagation(); clearFile();
});

function loadFile(file) {
  var ext = (file.name || '').split('.').pop().toLowerCase();
  if (ext !== 'html' && ext !== 'htm') return showStatus('error','❌','เลือกเฉพาะ .html หรือ .htm');
  var reader = new FileReader();
  reader.onload = function(e) {
    htmlContent = e.target.result;
    fileBadgeName.textContent = file.name;
    fileBadge.classList.add('show');
    document.getElementById('dzIcon').textContent  = '✅';
    document.getElementById('dzTitle').textContent = 'ไฟล์พร้อมแล้ว: ' + file.name;
    document.getElementById('dzSub').innerHTML     = 'Drop ไฟล์ใหม่เพื่อเปลี่ยน';
    btnImport.disabled = false;
    showStatus('info','📄','โหลดไฟล์แล้ว กด Import เพื่อเริ่ม');
  };
  reader.readAsText(file);
}

function clearFile() {
  htmlContent = null; fileInput.value = '';
  fileBadge.classList.remove('show');
  document.getElementById('dzIcon').textContent  = '📄';
  document.getElementById('dzTitle').textContent = 'Drop ไฟล์ HTML ที่นี่';
  document.getElementById('dzSub').innerHTML     = 'หรือ <span>คลิกเพื่อเลือกไฟล์</span> · .html, .htm';
  btnImport.disabled = true;
  hideStatus(); setProgress(0, false);
}

// ─── Import ───────────────────────────────────────────────────────────────────
btnImport.addEventListener('click', function() {
  if (!htmlContent || converting) return;
  converting = true; btnImport.disabled = true;
  setProgress(10, true);
  showStatus('loading', null, 'กำลัง render HTML ใน sandbox...');
  runConversion(htmlContent);
});

btnClose.addEventListener('click', function() {
  parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
});

// ─── Conversion ───────────────────────────────────────────────────────────────
function waitForImages(doc, ms) {
  return new Promise(function(resolve) {
    var imgs = Array.from(doc.querySelectorAll('img')).filter(function(i){ return !i.complete; });
    if (!imgs.length) return resolve();
    var n = imgs.length, t = setTimeout(resolve, ms || 6000);
    function done() { if (--n <= 0) { clearTimeout(t); resolve(); } }
    imgs.forEach(function(img) {
      img.addEventListener('load',  done, { once: true });
      img.addEventListener('error', done, { once: true });
    });
  });
}

function runConversion(html) {
  var iframe = document.createElement('iframe');
  iframe.style.cssText = 'position:absolute;left:-9999px;top:-9999px;width:1440px;height:900px;border:none;pointer-events:none;';
  document.body.appendChild(iframe);

  var done = false;
  var timer = setTimeout(function() {
    if (done) return; done = true; cleanup(iframe);
    converting = false; btnImport.disabled = false;
    setProgress(0, false);
    showStatus('error','❌','Timeout — HTML ซับซ้อนเกินไป (30s)');
  }, 30000);

  window.addEventListener('message', function handler(evt) {
    if (evt.source !== iframe.contentWindow) return;
    if (!evt.data || !evt.data.__h2f) return;
    clearTimeout(timer);
    window.removeEventListener('message', handler);
    done = true; cleanup(iframe);

    var layers = evt.data.layers;
    if (!layers || !layers.length) {
      converting = false; btnImport.disabled = false;
      setProgress(0, false);
      return showStatus('error','❌','ไม่พบ elements ที่แปลงได้');
    }
    setProgress(90);
    showStatus('loading', null, 'กำลังสร้าง layers ใน Figma...');
    parent.postMessage({ pluginMessage: { type: 'import', layers: layers } }, '*');
  });

  iframe.addEventListener('load', function() {
    setProgress(40); showStatus('loading', null, 'รอ images โหลด...');
    waitForImages(iframe.contentDocument, 5000).then(function() {
      setProgress(70); showStatus('loading', null, 'กำลังวิเคราะห์ DOM tree และ layout...');
      var script = iframe.contentDocument.createElement('script');
      script.textContent = CONVERTER_SRC;
      iframe.contentDocument.body.appendChild(script);
    });
  }, { once: true });

  iframe.srcdoc = html;
}

function cleanup(iframe) { try { document.body.removeChild(iframe); } catch(_) {} }

// ─── Messages from code.js ────────────────────────────────────────────────────
window.onmessage = function(e) {
  var msg = e.data && e.data.pluginMessage;
  if (!msg) return;
  converting = false; btnImport.disabled = false;
  if (msg.type === 'success') {
    setProgress(100);
    setTimeout(function() { setProgress(0, false); }, 1500);
    showStatus('success','✅', msg.message);
  } else if (msg.type === 'error') {
    setProgress(0, false); showStatus('error','❌', msg.message);
  } else if (msg.type === 'progress') {
    showStatus('loading', null, msg.message);
  }
};

// ─── UI helpers ───────────────────────────────────────────────────────────────
function showStatus(type, icon, text) {
  var el = document.getElementById('status');
  var ic = document.getElementById('statusIcon');
  var ms = document.getElementById('statusMsg');
  el.className = 'status show ' + (type === 'loading' ? 'info' : type);
  ic.innerHTML = type === 'loading' ? '<div class="spinner"></div>' : (icon || '');
  ms.textContent = text;
}
function hideStatus() { document.getElementById('status').className = 'status'; }
function setProgress(pct, show) {
  progressBar.style.width = pct + '%';
  if (show === false) progressWrap.classList.remove('show');
  else if (pct > 0)   progressWrap.classList.add('show');
}
</script>
