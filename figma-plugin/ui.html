<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    font-size: 13px;
    background: #1a1a2e;
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .header {
    padding: 14px 16px 12px;
    border-bottom: 1px solid #2d2d4a;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .logo {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .header h1 { font-size: 13px; font-weight: 600; color: #fff; }
  .header p  { font-size: 11px; color: #4a5568; margin-top: 1px; }

  .body {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 12px;
    overflow-y: auto;
  }

  /* ── Drop Zone ── */
  .drop-zone {
    flex: 1;
    min-height: 180px;
    border: 2px dashed #3d3d5c;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    background: #12122a;
    position: relative;
    padding: 24px;
    text-align: center;
  }
  .drop-zone:hover    { border-color: #5b5bf0; background: rgba(99,102,241,.05); }
  .drop-zone.dragover { border-color: #6366f1; background: rgba(99,102,241,.1); }
  .drop-zone input    { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  .dz-icon { font-size: 32px; line-height: 1; }
  .dz-title { font-size: 13px; font-weight: 600; color: #c4b5fd; }
  .dz-sub   { font-size: 11px; color: #4a5568; }
  .dz-sub span { color: #6366f1; }

  /* file loaded state */
  .file-badge {
    display: none;
    align-items: center;
    gap: 8px;
    background: rgba(99,102,241,.15);
    border: 1px solid rgba(99,102,241,.3);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    color: #a5b4fc;
    word-break: break-all;
  }
  .file-badge.show { display: flex; }
  .file-badge-icon { font-size: 16px; flex-shrink: 0; }
  .file-badge-name { flex: 1; }
  .file-badge-clear {
    background: none; border: none; color: #64748b;
    cursor: pointer; font-size: 14px; padding: 0; flex-shrink: 0;
  }
  .file-badge-clear:hover { color: #e2e8f0; }

  /* ── Status ── */
  .status {
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 11.5px;
    line-height: 1.5;
    display: none;
    gap: 8px;
    align-items: flex-start;
  }
  .status.show { display: flex; }
  .status.info    { background: rgba(99,102,241,.12); color: #a5b4fc; border: 1px solid rgba(99,102,241,.2); }
  .status.success { background: rgba(16,185,129,.1);  color: #6ee7b7; border: 1px solid rgba(16,185,129,.2); }
  .status.error   { background: rgba(239,68,68,.1);   color: #fca5a5; border: 1px solid rgba(239,68,68,.2); }
  .status-icon { flex-shrink: 0; }
  .status-msg  { flex: 1; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 13px; height: 13px;
    border: 2px solid rgba(165,180,252,.3);
    border-top-color: #a5b4fc;
    border-radius: 50%;
    animation: spin .65s linear infinite;
    flex-shrink: 0; margin-top: 1px;
  }

  /* ── Progress bar ── */
  .progress-wrap {
    height: 3px; background: #2d2d4a; border-radius: 2px;
    overflow: hidden; display: none;
  }
  .progress-wrap.show { display: block; }
  .progress-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    border-radius: 2px;
    transition: width .3s ease;
  }

  /* ── Footer ── */
  .footer {
    padding: 12px 16px;
    border-top: 1px solid #2d2d4a;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  button {
    height: 34px; border-radius: 8px; border: none;
    font-size: 12px; font-weight: 600;
    cursor: pointer; transition: opacity .15s, transform .1s;
  }
  button:active { transform: scale(.97); }

  .btn-primary {
    flex: 1;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
  }
  .btn-primary:hover    { opacity: .88; }
  .btn-primary:disabled { opacity: .35; cursor: not-allowed; transform: none; }

  .btn-secondary {
    width: 72px;
    background: #252540; color: #64748b; border: 1px solid #2d2d4a;
  }
  .btn-secondary:hover { background: #2d2d4a; color: #94a3b8; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #3d3d5c; border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🎨</div>
  <div>
    <h1>HTML to Figma Importer</h1>
    <p>Drop ไฟล์ .html → สร้าง Figma layers ทันที</p>
  </div>
</div>

<div class="body">

  <!-- Drop zone -->
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".html,.htm" />
    <div class="dz-icon" id="dzIcon">📄</div>
    <div class="dz-title" id="dzTitle">Drop ไฟล์ HTML ที่นี่</div>
    <div class="dz-sub" id="dzSub">หรือ <span>คลิกเพื่อเลือกไฟล์</span> · .html, .htm</div>
  </div>

  <!-- File badge -->
  <div class="file-badge" id="fileBadge">
    <span class="file-badge-icon">📄</span>
    <span class="file-badge-name" id="fileBadgeName"></span>
    <button class="file-badge-clear" id="fileClear" title="เลือกไฟล์ใหม่">✕</button>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- Status -->
  <div class="status" id="status">
    <div class="status-icon" id="statusIcon"></div>
    <div class="status-msg"  id="statusMsg"></div>
  </div>

</div>

<div class="footer">
  <button class="btn-secondary" id="btnClose">ปิด</button>
  <button class="btn-primary"   id="btnImport" disabled>🚀 Import to Figma</button>
</div>

// ─── State ────────────────────────────────────────────────────────────────────
var htmlContent = null;
var fileName    = null;
var converting  = false;

// ─── Elements ─────────────────────────────────────────────────────────────────
var dropZone    = document.getElementById('dropZone');
var fileInput   = document.getElementById('fileInput');
var fileBadge   = document.getElementById('fileBadge');
var fileBadgeName = document.getElementById('fileBadgeName');
var fileClear   = document.getElementById('fileClear');
var progressWrap = document.getElementById('progressWrap');
var progressBar  = document.getElementById('progressBar');
var btnImport   = document.getElementById('btnImport');
var btnClose    = document.getElementById('btnClose');
var dzIcon  = document.getElementById('dzIcon');
var dzTitle = document.getElementById('dzTitle');
var dzSub   = document.getElementById('dzSub');

// ─── File handling ────────────────────────────────────────────────────────────
fileInput.addEventListener('change', function() {
  if (fileInput.files && fileInput.files[0]) loadFile(fileInput.files[0]);
});

dropZone.addEventListener('dragover', function(e) {
  e.preventDefault();
  dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', function() {
  dropZone.classList.remove('dragover');
});
dropZone.addEventListener('drop', function(e) {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  var file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
  if (file) loadFile(file);
});

fileClear.addEventListener('click', function(e) {
  e.stopPropagation();
  clearFile();
});

function loadFile(file) {
  var ext = (file.name || '').split('.').pop().toLowerCase();
  if (ext !== 'html' && ext !== 'htm') {
    return showStatus('error', '❌', 'กรุณาเลือกไฟล์ .html หรือ .htm เท่านั้น');
  }
  var reader = new FileReader();
  reader.onload = function(e) {
    htmlContent = e.target.result;
    fileName    = file.name;
    setFileLoaded(file.name);
    showStatus('info', '📄', 'โหลดไฟล์ "' + file.name + '" แล้ว กด Import เพื่อเริ่ม');
  };
  reader.readAsText(file);
}

function setFileLoaded(name) {
  fileBadgeName.textContent = name;
  fileBadge.classList.add('show');
  dzIcon.textContent  = '✅';
  dzTitle.textContent = 'ไฟล์พร้อมแล้ว';
  dzSub.innerHTML     = 'กด Import หรือ Drop ไฟล์ใหม่เพื่อเปลี่ยน';
  btnImport.disabled  = false;
}

function clearFile() {
  htmlContent = null;
  fileName    = null;
  fileBadge.classList.remove('show');
  fileInput.value = '';
  dzIcon.textContent  = '📄';
  dzTitle.textContent = 'Drop ไฟล์ HTML ที่นี่';
  dzSub.innerHTML     = 'หรือ <span>คลิกเพื่อเลือกไฟล์</span> · .html, .htm';
  btnImport.disabled  = true;
  hideStatus();
  setProgress(0, false);
}

// ─── Import ───────────────────────────────────────────────────────────────────
btnImport.addEventListener('click', function() {
  if (!htmlContent || converting) return;
  startConversion();
});

btnClose.addEventListener('click', function() {
  parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
});

function startConversion() {
  converting = true;
  btnImport.disabled = true;
  setProgress(5, true);
  showStatus('loading', null, 'กำลัง render HTML...');

  // Use inlined browser.js source (embedded at build time)
  Promise.resolve(BROWSER_JS_SRC)
    .then(function(browserJsSrc) {
      setProgress(15);
      showStatus('loading', null, 'กำลัง render HTML ใน sandbox...');
      return runConversion(htmlContent, browserJsSrc);
    })
    .then(function(layers) {
      setProgress(90);
      showStatus('loading', null, 'กำลังส่งข้อมูลไปยัง Figma...');
      parent.postMessage({ pluginMessage: { type: 'import', layers: layers } }, '*');
      // success/error shown via message from code.js
    })
    .catch(function(err) {
      converting = false;
      btnImport.disabled = false;
      setProgress(0, false);
      showStatus('error', '❌', err.message || String(err));
    });
}

// ─── Conversion inside hidden iframe ─────────────────────────────────────────
function waitForImages(doc, timeout) {
  return new Promise(function(resolve) {
    var imgs = Array.from(doc.querySelectorAll('img')).filter(function(i) { return !i.complete; });
    if (!imgs.length) return resolve();
    var pending = imgs.length;
    var timer = setTimeout(resolve, timeout || 6000);
    function done() { if (--pending <= 0) { clearTimeout(timer); resolve(); } }
    imgs.forEach(function(img) {
      img.addEventListener('load',  done, { once: true });
      img.addEventListener('error', done, { once: true });
    });
  });
}

function runConversion(html, browserJsSrc) {
  return new Promise(function(resolve, reject) {
    var iframe = document.createElement('iframe');
    iframe.style.cssText = 'position:absolute;left:-9999px;top:-9999px;width:1440px;height:900px;border:none;pointer-events:none;';
    document.body.appendChild(iframe);

    var CHANNEL = '__h2f_' + Date.now();
    var done = false;

    var timer = setTimeout(function() {
      if (done) return;
      done = true;
      cleanup(iframe);
      reject(new Error('Conversion timeout (30s) — HTML อาจซับซ้อนเกินไป'));
    }, 30000);

    window.addEventListener('message', function handler(evt) {
      if (evt.source !== iframe.contentWindow) return;
      if (!evt.data || evt.data.__channel !== CHANNEL) return;
      clearTimeout(timer);
      window.removeEventListener('message', handler);
      done = true;
      cleanup(iframe);
      if (evt.data.error) return reject(new Error(evt.data.error));
      if (!evt.data.layers || !evt.data.layers.length) return reject(new Error('ไม่พบ elements ใน HTML ที่แปลงได้'));
      resolve(evt.data.layers);
    });

    // Wait for iframe to load then inject scripts
    iframe.addEventListener('load', function() {
      setProgress(40);
      showStatus('loading', null, 'รอรูปภาพโหลด...');

      waitForImages(iframe.contentDocument, 6000).then(function() {
        setProgress(65);
        showStatus('loading', null, 'กำลังแปลง HTML → Figma layers...');

        // Inject htmlToFigma library
        var libScript = iframe.contentDocument.createElement('script');
        libScript.textContent = browserJsSrc;
        iframe.contentDocument.head.appendChild(libScript);

        // Inject runner
        var runScript = iframe.contentDocument.createElement('script');
        runScript.textContent = [
          '(function() {',
          '  var CH = ' + JSON.stringify(CHANNEL) + ';',
          '  try {',
          '    var layers = window.htmlToFigma.htmlToFigma(document.body, true, false);',
          '    var safe = JSON.parse(JSON.stringify(layers));',
          '    window.parent.postMessage({ __channel: CH, layers: safe }, "*");',
          '  } catch(e) {',
          '    window.parent.postMessage({ __channel: CH, error: e.message }, "*");',
          '  }',
          '})();'
        ].join('\n');
        iframe.contentDocument.body.appendChild(runScript);
      });
    }, { once: true });

    iframe.srcdoc = html;
  });
}

function cleanup(iframe) {
  try { document.body.removeChild(iframe); } catch(_) {}
}

// ─── Messages from code.js ───────────────────────────────────────────────────
window.onmessage = function(e) {
  var msg = e.data && e.data.pluginMessage;
  if (!msg) return;
  converting = false;
  btnImport.disabled = false;
  if (msg.type === 'success') {
    setProgress(100);
    setTimeout(function() { setProgress(0, false); }, 1500);
    showStatus('success', '✅', msg.message);
  } else if (msg.type === 'error') {
    setProgress(0, false);
    showStatus('error', '❌', msg.message);
  } else if (msg.type === 'progress') {
    showStatus('loading', null, msg.message);
  }
};

// ─── UI helpers ───────────────────────────────────────────────────────────────
function showStatus(type, icon, text) {
  var el = document.getElementById('status');
  var iconEl = document.getElementById('statusIcon');
  var msgEl  = document.getElementById('statusMsg');
  el.className = 'status show ' + (type === 'loading' ? 'info' : type);
  if (type === 'loading') {
    iconEl.innerHTML = '<div class="spinner"></div>';
  } else {
    iconEl.textContent = icon || '';
  }
  msgEl.textContent = text;
}

function hideStatus() {
  document.getElementById('status').className = 'status';
}

function setProgress(pct, show) {
  progressBar.style.width = pct + '%';
  if (show === false) {
    progressWrap.classList.remove('show');
  } else if (pct > 0) {
    progressWrap.classList.add('show');
  }
}
</script>
</body>
</html>
